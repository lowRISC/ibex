include:
  - sections.yaml

options:
    mtriple: "riscv32"
    mcpu: generic-rv32
    march: "rv32imc_zba_zbb_zbc_zbs_zicsr"
    preserve-ra: true
    num-instrs: 5000
    redefine-sp: any-not-SP
    random-scheduling: true
    init-memory: full
    enable-static-stack: false

histogram:
    - [ADD, 1.0]
    - [ADDI, 1.0]
    - [AND, 1.0]
    - [ANDI, 1.0]
    - [ANDN, 1.0]
    - [AUIPC, 1.0]
