include:
  - sections.yaml

options:
    mtriple: "riscv32"
    mcpu: generic-rv32
    march: "rv32imc_zba_zbb_zbc_zbs_zicsr"
    num-instrs: 10000
    init-regs-in-elf: on
    preserve-ra: true

histogram:
    - [ADD, 1.0]
    - [ADDI, 1.0]
    - [AND, 1.0]
    - [ANDI, 1.0]
    - [ANDN, 1.0]
    - [AUIPC, 1.0]
    - [BCLR, 1.0]
    - [BCLRI, 1.0]
    - [BEXT, 1.0]
    - [BEXTI, 1.0]
    - [BINV, 1.0]
    - [BINVI, 1.0]
    - [BSET, 1.0]
