    - [CLZ, 1.0]
    - [CPOP, 1.0]
    - [CTZ, 1.0]
    - [LUI, 1.0]
    - [C_ADD, 1.0]
    - [C_ADDI, 1.0]
    - [C_ADDI16SP, 1.0]
    - [C_ADDI4SPN, 1.0]
    - [C_AND, 1.0]
    - [C_ANDI, 1.0]
    - [C_LI, 1.0]
