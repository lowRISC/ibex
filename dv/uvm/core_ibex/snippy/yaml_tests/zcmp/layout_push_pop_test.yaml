include:
  - ../sections.yaml

options:
    mtriple: "riscv32"
    mcpu: generic-rv32
    march: "rv32imc_zba_zbb_zbc_zbs_zicsr_zcmp"
    honor-target-abi: on
    num-instrs: 10000
    init-regs-in-elf: on
    init-memory: full
    redefine-sp: reg::X3

histogram:
    - [CM_PUSH, 1.0]
    - [CM_POP, 1.0]
