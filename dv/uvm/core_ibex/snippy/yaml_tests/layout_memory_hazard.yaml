sections:
  - name:      text
    VMA:       0x80050000
    SIZE:      0x30000
    LMA:       0x80050000
    ACCESS:    rx
  - name:      data
    VMA:       0x800A0000
    SIZE:      0x10
    LMA:       0x800A0000
    ACCESS:    rw
  - name:      stack
    VMA:       0x800B0000
    SIZE:      0x10000
    LMA:       0x800B0000
    ACCESS:    rw
  - name:      rodata
    VMA:       0x800C0000
    SIZE:      0x10000
    LMA:       0x800C0000
    ACCESS:    r

options:
    mtriple: "riscv32"
    mcpu: generic-rv32
    march: "rv32imc_zba_zbb_zbc_zbs_zicsr"
    preserve-ra: true
    num-instrs: 5000
    reserved-regs-list: [X0,X3,X4,X5,X6,X7,X8,X9,X11,X15,X16,X17,X18,X19,X20,X21,X22,X23,X24,X25,X26,X27,X28,X29,X30,X31]
    random-scheduling: true
    init-memory: full

histogram:
    - [C_LW, 34.5]
    - [C_SW, 34.5]
    - [LB, 34.5]
    - [LBU, 34.5]
    - [LH, 34.5]
    - [LHU, 34.5]
    - [LW, 34.5]
    - [SB, 34.5]
    - [SH, 34.5]
    - [SW, 34.5]
