include:
  - sections.yaml

options:
    mtriple: "riscv32"
    mcpu: generic-rv32
    march: "rv32imc_zba_zbb_zbc_zbs_zicsr_zifencei"
    preserve-ra: true
    init-regs-in-elf: true
    num-instrs: 80
    function-number: 2
    function-layers: 2
    num-instr-ancil: 15
    random-scheduling: true
    enable-static-stack: false
    mattr: "-exact-asm"

branches:
  permutation: off
  alignment: 1
  loop-ratio: 0.0

code-layout:
  ranges:
    - start: 0x80040000
      size: 0x40000
      stride: 0x1
      first-offset: 0
      last-offset: 0x0

smcgram:
   smc-tgt-blocks: 1
   smc-overwriters:
     min: 2
     max: 2
   smc-mode: immediate

histogram:
    - [ADD, 1.0]
    - [ADDI, 1.0]
    - [AND, 1.0]
    - [ANDI, 1.0]
    - [ANDN, 1.0]
    - [AUIPC, 1.0]
    - [BCLR, 1.0]
    - [BCLRI, 1.0]
    - [BEXT, 1.0]
    - [BEXTI, 1.0]
    - [BINV, 1.0]
    - [BINVI, 1.0]
    - [BSET, 1.0]
    - [BSETI, 1.0]
    - [CLZ, 1.0]
    - [CPOP, 1.0]
    - [CTZ, 1.0]
    - [C_ADD, 1.0]
    - [C_ADDI, 1.0]
    - [C_AND, 1.0]
