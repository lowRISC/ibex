branches:
  alignment: 1
  loop-ratio: 0.1
  number-of-loop-iterations:
    min: 2
    max: 7
  max-depth:
    if: 300
    loop: 1
  distance:
    blocks:
      min: 1
      max: 80

call-graph:
  entry-point: SnippyFunction
  function-list:
    - name: SnippyFunction
      callees:
        - fun_low
        - fun_b19
        - fun_b20
        - fun_b21
        - fun_b22
        - fun_b23
        - fun_b24
        - fun_b25
        - fun_b26
        - fun_b27
        - fun_b28
        - fun_b29
        - fun_b30
        - fun_b31
    - name: fun_low
      callees:
        - fun_b19
        - fun_b31
    - name: fun_b19
      callees:
        - fun_b20
        - fun_b30
    - name: fun_b20
      callees:
