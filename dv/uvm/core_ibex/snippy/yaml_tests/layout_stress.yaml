options:
  mtriple: "riscv32"
  mcpu: generic-rv32
  march: "rv32imc_zba_zbb_zbc_zbs_zicsr"
  preserve-ra: true
  redefine-sp: any-not-SP
  random-scheduling: true
  init-memory: full
  init-regs-in-elf: on
  num-instrs: 12000
  riscv-disable-misaligned-access: false
  enable-static-stack: false

code-layout:
  ranges:
    - start: 0x00000000
      size: 0x20000
      stride: 0x20
      first-offset: 0
      last-offset: 0
      weight: 4

    - start: 0x00080000
      size: 0x20000
      stride: 0x20
      first-offset: 0
      last-offset: 0
      weight: 8

